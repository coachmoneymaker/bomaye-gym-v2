  <style>
    /* ── Page reset / base ──────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      min-height: 100vh;
      color: #fff;
      font-family: var(--font-body);
    }

    /* ── Minimal header ─────────────────────────────────── */
    .mw-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      height: 72px;
      background: rgba(8,8,8,0.90);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border-bottom: 1px solid rgba(197,160,89,0.10);
      box-shadow: 0 1px 0 rgba(198,164,90,0.05), 0 8px 32px rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      padding: 0 2rem;
    }
    .mw-header-inner {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .mw-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: #fff;
      flex-shrink: 0;
    }
    .mw-logo-img {
      height: 56px;
      width: auto;
      display: block;
    }
    .mw-logo-text {
      font-family: var(--font-display);
      font-size: 1.25rem;
      letter-spacing: 3px;
      color: #fff;
      line-height: 1;
    }
    .mw-back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-head);
      font-size: 0.68rem;
      letter-spacing: 2.5px;
      color: rgba(255,255,255,0.48);
      text-decoration: none;
      transition: color 0.22s ease;
      white-space: nowrap;
    }
    .mw-back-link:hover { color: var(--white); }
    .mw-back-link i { font-size: 0.6rem; }

    /* ── Page wrapper ────────────────────────────────────── */
    .mw-page {
      padding-top: 72px; /* matches header height */
      min-height: 100vh;
    }

    /* ── Footer strip ────────────────────────────────────── */
    .mw-footer {
      background: #080808;
      border-top: 1px solid rgba(198,164,90,0.10);
      padding: 1.5rem 1.25rem;
      text-align: center;
    }
    .mw-footer-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem 1.5rem;
      margin-bottom: 0.75rem;
    }
    .mw-footer-links a {
      font-family: var(--font-head);
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      transition: color 0.2s;
    }
    .mw-footer-links a:hover { color: var(--gold); }
    .mw-footer-copy {
      font-family: var(--font-head);
      font-size: 0.58rem;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.18);
    }

    @media (max-width: 480px) {
      .mw-header { height: 64px; padding: 0 1rem; }
      .mw-page { padding-top: 64px; }
      .mw-logo-img { height: 40px; }
    }

</head>
<body>

  <!-- ═══════ MINIMAL HEADER ═══════ -->
  <header class="mw-header">
    <div class="mw-header-inner">
      <a href="/" class="mw-logo" aria-label="Bomaye Gym Startseite">
        <img src="/assets/images/bomaye-logo.png" alt="Bomaye Gym Logo" class="mw-logo-img"
             onerror="this.style.display='none'" />

      </a>
      <a href="/" class="mw-back-link" aria-label="Zurück zur Startseite">
        <i class="fa-solid fa-arrow-left"></i> STARTSEITE
      </a>
    </div>
  </header>

  <!-- ═══════ PAGE CONTENT ═══════ -->
  <main class="mw-page" role="main">

    <!-- ── INTRO TEXT ── -->
    <div style="max-width: 800px; margin: 0 auto; padding-top: 80px; padding-left: 24px; padding-right: 24px; text-align: center;">
      <h1 style="font-family: inherit; font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 800; letter-spacing: 0.12em; color: #0d0d0d; margin: 0 0 16px;">MITGLIEDSCHAFT WÄHLEN</h1>
      <p style="font-size: clamp(0.95rem, 2.5vw, 1.1rem); color: #444444; line-height: 1.7; margin: 0 0 32px; max-width: 520px; margin-left: auto; margin-right: auto;">Wähle deine Mitgliedschaft und sichere dir deinen Platz im BOMAYE GYM.</p>

      <!-- ── IMPORTANT NOTICE ── -->
      <div style="display: inline-block; background: #f5f0e8; border-left: 3px solid #c9a84c; border-radius: 6px; padding: 14px 22px; margin-bottom: 48px; max-width: 520px; text-align: left;">
        <p style="margin: 0; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.06em; color: #0d0d0d; text-transform: uppercase;">WICHTIG:</p>
        <p style="margin: 6px 0 0; font-size: 0.9rem; color: #333333; line-height: 1.6;">Bitte wähle im Buchungsprozess als Startdatum den <strong>15.04.</strong></p>
      </div>
    </div>

    <!-- ── BSPORT REGISTRATION / LOGIN WIDGET ── -->
    <div style="max-width: 800px; margin: 0 auto; padding-top: 0; padding-bottom: 100px; background: #ffffff;">
      <div id="bsport-widget-mitglied"></div>
    </div>

    <!-- ── FOOTER ── -->

      </nav>
      <p class="mw-footer-copy">&copy; 2026 BOMAYE GYM MÜNCHEN — PINEAPPLE PARK</p>
    </footer>

  </main>

  <!-- ══════════════════════════════════════════════════════════
       BSPORT WIDGET — Subscription / Registration / Login Flow
       Loads inline on the page so the user stays on bomayegym.com
  ══════════════════════════════════════════════════════════ -->

  <!-- 1. Load bsport CDN (guarded against double-load) -->
  <script id="insert-bsport-widget-cdn">
    !function(b,s,p){
      typeof window.BsportWidget==="undefined" &&
      !document.getElementById("bsport-widget-cdn") &&
      (function(){
        var m=b.createElement(s);
        m.id="bsport-widget-cdn";
        m.src=p;
        b.getElementsByTagName("head")[0].appendChild(m);
      })();
    }(document,"script","https://cdn.bsport.io/scripts/widget.js");
  </script>

  <!-- 2. Mount helper with retry logic -->
  <script id="bsport-widget-mount">
    function MountBsportWidget(config, repeat) {
      repeat = repeat || 1;
      if (repeat > 50) { return; }
      if (!window.BsportWidget) {
        return setTimeout(function(){ MountBsportWidget(config, repeat + 1); }, 100 * repeat || 1);
      }
      BsportWidget.mount(config);
    }
  </script>

  <!-- 3. Mount the subscription / registration flow -->
  <script>
    MountBsportWidget({
      parentElement: "bsport-widget-mitglied",
      companyId: 5473,
      dialogMode: 1,
      widgetType: "subscription",
      showFab: false,
      fullScreenPopup: false
    });
  </script>

</body>
