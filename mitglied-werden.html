    #bsport-widget-mitglied .cleanslate [class*="card"]:hover,
    #bsport-widget-mitglied .cleanslate [class*="Card"]:hover,
    #bsport-widget-mitglied .cleanslate [class*="offer"]:hover,

    /* ── Borders: #E5E7EB ── */
    #bsport-widget-mitglied .cleanslate [class*="divider"],
    #bsport-widget-mitglied .cleanslate [class*="Divider"],
    #bsport-widget-mitglied .cleanslate [class*="separator"],

    /* ── CTA / cart icon: gold accent, prominent size ── */
    #bsport-widget-mitglied .cleanslate [class*="cart"],

    /* ── List / scroll containers ── */
    #bsport-widget-mitglied .cleanslate [class*="list"],
    #bsport-widget-mitglied .cleanslate [class*="List"] {
      background: #ffffff !important;
      gap: 0.75rem !important;

    #bsport-widget-mitglied .cleanslate [class*="filter"],

    #bsport-widget-mitglied .cleanslate [class*="tabs"]::-webkit-scrollbar {

    #bsport-widget-mitglied .cleanslate [class*="Sticky"] {

    #bsport-widget-mitglied [role="button"],
    #bsport-widget-mitglied input,
    #bsport-widget-mitglied select {

    /* ── Loading state — dark text on white card ────────── */
    .mw-widget-loading {
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      color: rgba(30,30,30,0.45);
      font-family: Helvetica, 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.7rem;
      letter-spacing: 2.5px;
      background: #ffffff;
      border-radius: 20px;
    }
    .mw-widget-loading i {
      color: var(--gold);
      font-size: 1.5rem;
      animation: mw-spin 1s linear infinite;
    }
    @keyframes mw-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Footer strip ────────────────────────────────────── */
    .mw-footer {
      border-top: 1px solid rgba(198,164,90,0.10);
      padding: 1.5rem 1.25rem;
      text-align: center;
    }
    .mw-footer-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem 1.5rem;
      margin-bottom: 0.75rem;
    }
    .mw-footer-links a {
      font-family: var(--font-head);
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      transition: color 0.2s;
    }
    .mw-footer-links a:hover { color: var(--gold); }
    .mw-footer-copy {
      font-family: var(--font-head);
      font-size: 0.58rem;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.18);

    /* ── Mobile adjustments ─────────────────────────────── */
    @media (max-width: 768px) {
      .mw-widget-inner { padding: 0 1rem; }

      /* Reduce card padding on tablet */
      #bsport-widget-mitglied .cleanslate [class*="card"],

      #bsport-widget-mitglied .cleanslate [class*="offer"],
      #bsport-widget-mitglied .cleanslate [class*="Offer"] {

      }

    @media (max-width: 480px) {
      .mw-header { height: 64px; padding: 0 1rem; }
      .mw-page { padding-top: 64px; }
      .mw-logo-img { height: 40px; }
      .mw-widget-inner { padding: 0 0.75rem; }
      .mw-widget-section { padding: 40px 0 56px; }
      .mw-widget-wrap { border-radius: 16px; }
      #bsport-widget-mitglied {
        min-height: 500px;
        border-radius: 16px;
      }
      /* Remove inner padding override on mobile — no horizontal overflow */
      #bsport-widget-mitglied .cleanslate > * {
        padding-left: 0.75rem !important;
        padding-right: 0.75rem !important;
      }
      #bsport-widget-mitglied .cleanslate [class*="card"],
      #bsport-widget-mitglied .cleanslate [class*="Card"],
      #bsport-widget-mitglied .cleanslate [class*="offer"],
      #bsport-widget-mitglied .cleanslate [class*="Offer"] {
        padding: 1rem 1rem !important;
        border-radius: 12px !important;
        margin-bottom: 0.75rem !important;
      }
      /* Sticky widget header: clear the shorter mobile nav */
      #bsport-widget-mitglied .cleanslate [class*="sticky"],
      #bsport-widget-mitglied .cleanslate [class*="Sticky"] {
        top: 64px !important;
      }
    }

    /* ── Prevent the page from locking scroll when finger starts inside widget ──
       overscroll-behavior:none is set only on inner scrollable containers,
       NOT on the widget root, so the outer page always scrolls normally.    ── */
    #bsport-widget-mitglied .cleanslate [class*="scroll"],
    #bsport-widget-mitglied .cleanslate [class*="Scroll"],
    #bsport-widget-mitglied .cleanslate [class*="overflow"],
    #bsport-widget-mitglied .cleanslate [class*="list-wrap"],
    #bsport-widget-mitglied .cleanslate [class*="ListWrap"] {
      overscroll-behavior-y: contain;
    }

    /* ── Prevent horizontal scrolling at page level ── */
    body { overflow-x: hidden; }
    .mw-page { overflow-x: hidden; }

  <!-- ══════════════════════════════════════════════════════════
       BSPORT WIDGET — Subscription / Registration / Login Flow
       Loads inline on the page so the user stays on bomayegym.com
  ══════════════════════════════════════════════════════════ -->

  <!-- 1. Load bsport CDN (guarded against double-load) -->
  <script id="insert-bsport-widget-cdn">
    !function(b,s,p){
      typeof window.BsportWidget==="undefined" &&
      !document.getElementById("bsport-widget-cdn") &&
      (function(){
        var m=b.createElement(s);
        m.id="bsport-widget-cdn";
        m.src=p;
        b.getElementsByTagName("head")[0].appendChild(m);
      })();
    }(document,"script","https://cdn.bsport.io/scripts/widget.js");
  </script>

  <!-- 2. Mount helper with retry logic -->
  <script id="bsport-widget-mount">
    function MountBsportWidget(config, repeat) {
      repeat = repeat || 1;
      if (repeat > 50) { return; }
      if (!window.BsportWidget) {
        return setTimeout(function(){ MountBsportWidget(config, repeat + 1); }, 100 * repeat || 1);
      }
      BsportWidget.mount(config);
      /* Hide the loading spinner once widget is mounted */
      var loader = document.getElementById("mw-widget-loading");
      if (loader) { loader.style.display = "none"; }
    }
  </script>

  <!-- 3. Mount the subscription / registration flow -->
  <script>
    MountBsportWidget({
      parentElement: "bsport-widget-mitglied",
      companyId: 5473,
      dialogMode: 1,
      widgetType: "subscription",
      showFab: false,
      fullScreenPopup: false
    });
  </script>
