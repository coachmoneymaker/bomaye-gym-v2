<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
  <title>Mitglied werden | BOMAYE GYM MÜNCHEN</title>
  <meta name="description" content="Jetzt Mitglied werden bei Bomaye Gym München. Direkte Anmeldung und Registrierung für deine Mitgliedschaft." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#080808" />

  <!-- Open Graph -->
  <meta property="og:title" content="Mitglied werden — BOMAYE GYM MÜNCHEN" />
  <meta property="og:description" content="Jetzt direkt anmelden und Mitglied bei Bomaye Gym München werden." />
  <meta property="og:image" content="https://www.bomayegym.com/assets/images/community.webp" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.bomayegym.com/mitglied-werden" />
  <meta property="og:locale" content="de_DE" />

  <link rel="canonical" href="https://www.bomayegym.com/mitglied-werden" />

  <!-- Preload critical assets -->
  <link rel="preload" href="/assets/images/bomaye-logo.png" as="image" fetchpriority="high" />
  <link rel="preload" href="/assets/css/style.css" as="style" />

  <!-- bsport warm-up -->
  <link rel="preconnect" href="https://backoffice.bsport.io" crossorigin />
  <link rel="dns-prefetch" href="https://backoffice.bsport.io" />
  <link rel="preconnect" href="https://cdn.bsport.io" crossorigin />
  <link rel="dns-prefetch" href="https://cdn.bsport.io" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600&family=Oswald:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600&family=Oswald:wght@400;500;600;700&display=swap" /></noscript>

  <!-- Font Awesome -->
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" /></noscript>

  <!-- Site styles -->
  <link rel="stylesheet" href="assets/css/style.css" />

  <style>
    /* ── Page reset / base ──────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(160deg, #141414 0%, #111111 48%, #12141a 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: #fff;
      font-family: var(--font-body);
    }

    /* ── Minimal header ─────────────────────────────────── */
    .mw-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      height: 72px;
      background: rgba(8,8,8,0.90);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border-bottom: 1px solid rgba(197,160,89,0.10);
      box-shadow: 0 1px 0 rgba(198,164,90,0.05), 0 8px 32px rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      padding: 0 2rem;
    }
    .mw-header-inner {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .mw-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: #fff;
      flex-shrink: 0;
    }
    .mw-logo-img {
      height: 48px;
      width: auto;
      display: block;
    }
    .mw-logo-text {
      font-family: var(--font-display);
      font-size: 1.25rem;
      letter-spacing: 3px;
      color: #fff;
      line-height: 1;
    }
    .mw-back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-head);
      font-size: 0.68rem;
      letter-spacing: 2.5px;
      color: rgba(255,255,255,0.48);
      text-decoration: none;
      transition: color 0.22s ease;
      white-space: nowrap;
    }
    .mw-back-link:hover { color: var(--white); }
    .mw-back-link i { font-size: 0.6rem; }

    /* ── Page wrapper ────────────────────────────────────── */
    .mw-page {
      padding-top: 72px; /* matches header height */
      min-height: 100vh;
    }

    /* ── Widget section ──────────────────────────────────── */
    .mw-widget-section {
      padding: clamp(32px, 5vw, 48px) 0 clamp(48px, 8vw, 80px);
    }
    .mw-widget-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.25rem;
    }

    /* Widget container — natural page flow for mobile scroll */
    .mw-widget-wrap {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      /* Let bsport iframe set its own height; page scrolls naturally */
    }

    /* Ensure bsport widget div fills container and shows content */
    #bsport-widget-mitglied {
      width: 100%;
      min-height: 640px;
      display: block;
    }

    /* Fix mobile touch scrolling on any inner scroll container bsport renders */
    #bsport-widget-mitglied * {
      -webkit-overflow-scrolling: touch;
    }

    /* ── Loading state ───────────────────────────────────── */
    .mw-widget-loading {
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      color: rgba(255,255,255,0.35);
      font-family: var(--font-head);
      font-size: 0.7rem;
      letter-spacing: 2.5px;
    }
    .mw-widget-loading i {
      color: var(--gold);
      font-size: 1.5rem;
      animation: mw-spin 1s linear infinite;
    }
    @keyframes mw-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Footer strip ────────────────────────────────────── */
    .mw-footer {
      border-top: 1px solid rgba(198,164,90,0.10);
      padding: 1.5rem 1.25rem;
      text-align: center;
    }
    .mw-footer-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem 1.5rem;
      margin-bottom: 0.75rem;
    }
    .mw-footer-links a {
      font-family: var(--font-head);
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      transition: color 0.2s;
    }
    .mw-footer-links a:hover { color: var(--gold); }
    .mw-footer-copy {
      font-family: var(--font-head);
      font-size: 0.58rem;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.18);
    }

    /* ── Mobile adjustments ─────────────────────────────── */
    @media (max-width: 480px) {
      .mw-header { height: 64px; padding: 0 1.25rem; }
      .mw-page { padding-top: 64px; }
      .mw-logo-img { height: 40px; }
      #bsport-widget-mitglied { min-height: 500px; }
    }
  </style>
</head>
<body>

  <!-- ═══════ MINIMAL HEADER ═══════ -->
  <header class="mw-header">
    <div class="mw-header-inner">
      <a href="/" class="mw-logo" aria-label="Bomaye Gym Startseite">
        <img src="/assets/images/bomaye-logo.png" alt="Bomaye Gym Logo" class="mw-logo-img"
             onerror="this.style.display='none'" />
        <span class="mw-logo-text">BOMAYE</span>
      </a>
      <a href="/" class="mw-back-link" aria-label="Zurück zur Startseite">
        <i class="fa-solid fa-arrow-left"></i> STARTSEITE
      </a>
    </div>
  </header>

  <!-- ═══════ PAGE CONTENT ═══════ -->
  <main class="mw-page" role="main">

    <!-- ── BSPORT REGISTRATION / LOGIN WIDGET ── -->
    <section class="mw-widget-section" aria-label="Mitgliedschaft Anmeldung">
      <div class="mw-widget-inner">
        <div class="mw-widget-wrap">

          <!-- Loading indicator shown until bsport mounts -->
          <div class="mw-widget-loading" id="mw-widget-loading" aria-live="polite" aria-label="Wird geladen">
            <i class="fa-solid fa-circle-notch" aria-hidden="true"></i>
            <span>WIRD GELADEN …</span>
          </div>

          <!-- bsport mounts here -->
          <div id="bsport-widget-mitglied"></div>

        </div>
      </div>
    </section>

    <!-- ── FOOTER ── -->
    <footer class="mw-footer" role="contentinfo">
      <nav class="mw-footer-links" aria-label="Rechtliches">
        <a href="/impressum">IMPRESSUM</a>
        <a href="/datenschutz">DATENSCHUTZ</a>
        <a href="/agb">AGB</a>
        <a href="/faq">FAQ</a>
      </nav>
      <p class="mw-footer-copy">&copy; 2026 BOMAYE GYM MÜNCHEN — PINEAPPLE PARK</p>
    </footer>

  </main>

  <!-- ══════════════════════════════════════════════════════════
       BSPORT WIDGET — Subscription / Registration / Login Flow
       Loads inline on the page so the user stays on bomayegym.com
  ══════════════════════════════════════════════════════════ -->

  <!-- 1. Load bsport CDN (guarded against double-load) -->
  <script id="insert-bsport-widget-cdn">
    !function(b,s,p){
      typeof window.BsportWidget==="undefined" &&
      !document.getElementById("bsport-widget-cdn") &&
      (function(){
        var m=b.createElement(s);
        m.id="bsport-widget-cdn";
        m.src=p;
        b.getElementsByTagName("head")[0].appendChild(m);
      })();
    }(document,"script","https://cdn.bsport.io/scripts/widget.js");
  </script>

  <!-- 2. Mount helper with retry logic -->
  <script id="bsport-widget-mount">
    function MountBsportWidget(config, repeat) {
      repeat = repeat || 1;
      if (repeat > 50) { return; }
      if (!window.BsportWidget) {
        return setTimeout(function(){ MountBsportWidget(config, repeat + 1); }, 100 * repeat || 1);
      }
      BsportWidget.mount(config);
      /* Hide the loading spinner once widget is mounted */
      var loader = document.getElementById("mw-widget-loading");
      if (loader) { loader.style.display = "none"; }
    }
  </script>

  <!-- 3. Mount the subscription / registration flow -->
  <script>
    MountBsportWidget({
      parentElement: "bsport-widget-mitglied",
      companyId: 5473,
      dialogMode: 1,
      widgetType: "subscription",
      showFab: false,
      fullScreenPopup: false
    });
  </script>

</body>
</html>
